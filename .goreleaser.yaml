version: 2

# .goreleaser.yaml is kept for local snapshot builds:
#   goreleaser build --snapshot --single-target --clean
#
# CI releases use .github/workflows/release.yml directly (matrix of native
# amd64 + arm64 runners) because the embedded viewer binary is arch-specific
# and cannot be cross-compiled.
#
# Before running goreleaser locally, build the viewer asset first:
#   mage buildAll

before:
  hooks:
    - go mod tidy

builds:
  - id: desktopus
    main: ./cmd/desktopus
    binary: desktopus
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=embed_viewer
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/desktopus-org/desktopus/internal/cli.version={{.Version}}
      - -X github.com/desktopus-org/desktopus/internal/cli.commit={{.Commit}}
      - -X github.com/desktopus-org/desktopus/internal/cli.buildTime={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other Changes
      order: 999

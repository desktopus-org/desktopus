version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: desktopus
    main: ./cmd/desktopus
    binary: desktopus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/desktopus-org/desktopus/internal/cli.version={{.Version}}
      - -X github.com/desktopus-org/desktopus/internal/cli.commit={{.Commit}}
      - -X github.com/desktopus-org/desktopus/internal/cli.buildTime={{.Date}}

archives:
  - id: default
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other Changes
      order: 999

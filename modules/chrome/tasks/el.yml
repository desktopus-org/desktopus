---
- name: Add Google Chrome repository
  ansible.builtin.yum_repository:
    name: google-chrome
    description: Google Chrome
    baseurl: https://dl.google.com/linux/chrome/rpm/stable/x86_64
    gpgkey: https://dl.google.com/linux/linux_signing_key.pub
    gpgcheck: true
    enabled: true

- name: Install Google Chrome
  ansible.builtin.dnf:
    name: "google-chrome-{{ chrome_channel | default('stable') }}"
    state: present

- name: Ensure Desktop directory exists
  ansible.builtin.file:
    path: "{{ desktopus_home }}/Desktop"
    state: directory
    owner: "{{ desktopus_user }}"
    mode: "0755"

- name: Create desktop shortcut
  ansible.builtin.copy:
    src: /usr/share/applications/google-chrome.desktop
    dest: "{{ desktopus_home }}/Desktop/google-chrome.desktop"
    owner: "{{ desktopus_user }}"
    mode: "0755"
    remote_src: true
  ignore_errors: true
